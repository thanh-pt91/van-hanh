name: Deploy DataFlow to GitHub Pages

"on":
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Script URL
        env:
          GAS_URL: ${{ secrets.GAS_SCRIPT_URL }}
        run: |
          sed -i "s|__SCRIPT_URL__|${GAS_URL}|g" index.html
          if grep -q "__SCRIPT_URL__" index.html; then
            echo "❌ GAS_SCRIPT_URL secret chưa được cài đặt!"
            exit 1
          fi
          echo "✅ Inject URL thành công"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Script URL from Secrets
        run: |
          # Thay placeholder __SCRIPT_URL__ bằng URL thật từ GitHub Secrets
          sed -i "s|__SCRIPT_URL__|${{ secrets.GAS_SCRIPT_URL }}|g" index.html
          echo "✅ Đã inject Script URL"
          # Kiểm tra placeholder còn không
          if grep -q "__SCRIPT_URL__" index.html; then
            echo "❌ Lỗi: GAS_SCRIPT_URL secret chưa được cài đặt!"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
