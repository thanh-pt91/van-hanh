name: Deploy DataFlow

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject URLs
        env:
          GAS_URL: ${{ secrets.GAS_SCRIPT_URL }}
          DB_URL: ${{ secrets.GAS_DB_SCRIPT_URL }}
        run: |
          sed -i "s|__SCRIPT_URL__|${GAS_URL}|g" index.html
          sed -i "s|__DB_SCRIPT_URL__|${DB_URL}|g" index.html
          grep -q "__SCRIPT_URL__" index.html && echo "❌ GAS_SCRIPT_URL chưa set!" && exit 1
          echo "✅ Inject URLs thành công"

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
